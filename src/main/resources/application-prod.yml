      - '"eingetragen im" Landwirtschaftsbetrieb Kontakt'
      - '"Amtsgericht" Bauernhof Hofladen Adresse'
      - '"HRB" OR "HRA" Agrarbetrieb Direktverkauf Kontakt'
      - '"Einzelunternehmen" Bauernhof Direktverkauf Adresse'
      - '"GbR" Bauernhof Hofladen Direktverkauf Kontakt'
      - '"GbR" Hof Gemüse Direktverkauf Adresse'
      - '"GbR" Agrarbetrieb Obst Kontakt'
