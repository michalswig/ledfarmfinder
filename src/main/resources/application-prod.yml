      - '"Landwirt" Impressum Kontakt Telefon Deutschland'
      - '"Landwirtin" Impressum Hofladen Kontakt'

      # =========================
      # FRAZY "AB HOF" / "VOM HOF" (BARDZO SILNE)
      # Frazy używane wyłącznie przez prawdziwe gospodarstwa
      # =========================
