aws:
  ses:
    region: ${AWS_REGION:eu-central-1}
    configuration-set: ${AWS_SES_CONFIGURATION_SET:leadfarmfinder-main}


spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: o1jobs.de
    port: 587
    username: office@o1jobs.de
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

      mail.smtp.from: office@o1jobs.de
      mail.smtp.localhost: o1jobs.de

      # chmura wolniejsza -> 15s
      mail.smtp.connectiontimeout: ${MAIL_CONN_TIMEOUT_MS:15000}
      mail.smtp.timeout: ${MAIL_TIMEOUT_MS:15000}
      mail.smtp.writetimeout: ${MAIL_WRITE_TIMEOUT_MS:15000}

      mail.debug: false

leadfinder:
  query-cycle:
    cron: "0 0 3 * * SUN"
    score-threshold: 40
    test-limit: 5
  rabbit:
    outreach-events-exchange: outreach.events.exchange
    outreach-events-queue: outreach.event.queue
    outreach-events-dlq: outreach.event.dlq
    outreach-events-routing-key: outreach.event
    outreach-events-retry-queue: outreach.event.retry.queue
    outreach-events-retry-routing-key: outreach.event.retry
    outreach-events-dlq-routing-key: outreach.event.dlq
    retry-ttl-ms: ${RABBIT_RETRY_TTL_MS:30000}
    max-retry-attempts: ${RABBIT_MAX_RETRY_ATTEMPTS:2}
  agrarjobboerse:
    pagesPerRun: 2
    pageCap: 50
    admin-token: ${AJB_ADMIN_TOKEN:}
    enabled: ${AJB_ENABLED:false}
    dryRun: ${AJB_DRY_RUN:false}
    startUrl: ${AJB_START_URL:https://www.agrarjobboerse.de/boerse/stellenangebote?plz=&dist=10&bkz=501&bkz=109411&bkz=58540&bkz=520&bkz=491&bkz=538&bkz=739&bkz=590&bkz=625&bkz=90128&s=0}
    maxPagesPerRun: ${AJB_MAX_PAGES:1}
    maxOffersPerRun: ${AJB_MAX_OFFERS:25}
    minDelayMs: ${AJB_MIN_DELAY_MS:900}
    maxDelayMs: ${AJB_MAX_DELAY_MS:1800}
    pageTimeoutMs: ${AJB_PAGE_TIMEOUT_MS:45000}
    clickTimeoutMs: ${AJB_CLICK_TIMEOUT_MS:8000}
    cron:
      enabled: ${AJB_CRON_ENABLED:false}
      expression: ${AJB_CRON_EXPRESSION:0 35 2 * * *}

  email:
    provider: ${APP_MAIL_PROVIDER:ses}
    mx-check-enabled: ${EMAIL_MX_CHECK:true}
    mx-timeout-ms: ${EMAIL_MX_TIMEOUT_MS:2000}
    mx-unknown-policy: ${EMAIL_MX_UNKNOWN_POLICY:ALLOW}
    known-tlds: [de,com,net,eu]

  outreach:
    enabled: ${OUTREACH_ENABLED:true}
    from-address: ${OUTREACH_FROM:Patrycja Swigost <patrycja@office.o1jobs.de>}
    default-subject: ${OUTREACH_SUBJECT:kurze Frage – Arbeitskräfte zur Saison}
    max-emails-per-run: ${OUTREACH_MAX_PER_RUN:10}
    simulate-only: ${OUTREACH_SIMULATE_ONLY:false}
    interval-millis: ${OUTREACH_INTERVAL_MS:900000}
    delay-between-emails-millis: ${OUTREACH_DELAY_MS:15000}
    first-email-body-template: |
      Guten Tag,
      
      ich melde mich kurz bei Ihnen.
      
      Ich habe aktuell Kontakt zu mehreren Arbeitskräften aus Polen,
      die in den nächsten Wochen verfügbar sind (u. a. Spargel, Obst).
      Viele haben bereits Erfahrung in Deutschland – wir selbst arbeiten seit über 6 Jahren mit landwirtschaftlichen Betrieben zusammen.
      
      Falls das für Sie aktuell oder in den nächsten Wochen interessant ist,
      geben Sie mir gerne kurz Bescheid.
      
      Viele Grüße
      Patrycja
      o1jobs
      +49 160 6328144

    follow-up-subject: ${OUTREACH_FOLLOWUP_SUBJECT:kurze Rückmeldung}

    follow-up-min-days-since-last-email: ${OUTREACH_FOLLOWUP_MIN_DAYS:60}

    follow-up-email-body-template: |
      Guten Tag,
      
      ich melde mich kurz.
      
      Falls das Thema noch aktuell ist –
      wir sind weiterhin in Kontakt mit Arbeitskräften aus Polen,
      die kurzfristig verfügbar sind (u. a. Ernte, Spargel, Obst).
      
      Wenn sich bei Ihnen etwas ergibt oder im Laufe der Saison Bedarf entsteht,
      geben Sie mir gerne kurz Bescheid – wir können in der Regel flexibel und kurzfristig unterstützen.
      
      Wenn wir dazu schon im Austausch sind, ist natürlich alles in Ordnung – wir bleiben in Kontakt.
      
      Viele Grüße
      Patrycja
      o1jobs
      +49 160 6328144

  scraper:
    min-hours-between-scrapes: 12

