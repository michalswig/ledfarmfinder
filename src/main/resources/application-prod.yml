app:
  outreach:
    unsubscribe-base-url: ${UNSUBSCRIBE_BASE_URL:https://leadfarmfinder.onrender.com/unsubscribe/}
  admin-token: ${ADMIN_TOKEN:local-dev-token}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://api.openai.com/v1
  model: gpt-5.1

serpapi:
  api-key: ${SERPAPI_API_KEY:}
  base-url: https://serpapi.com/search
  default-country: de
  default-language: de
  default-engine: google

logging:
  level:
    com.mike.leadfarmfinder.service.ajb: INFO
    com.mike.leadfarmfinder.bootstrap: INFO

directory:
  enabled: ${DIRECTORY_ENABLED:false}
  max-urls-per-run: ${DIRECTORY_MAX-URLS-PER-RUN:200}

hofladenfinder:
  base-url: https://www.hofladenfinder.org/farmshop/search
  max-pages-per-product: 200
  products:
    - spargel
    - erdbeeren
    - kartoffeln
    - tomaten
    - gurken
    - blumen
    - gemüse
    - obst
    - kräuter
    - kürbis
    - zwiebeln
    - möhren

osm:
  cron: "0 0 2 * * SUN"
  overpass-url: https://overpass-api.de/api/interpreter
  bbox: "47.3,5.9,55.1,15.0"
  timeout-ms: 60000
  max-urls-per-run: 300
