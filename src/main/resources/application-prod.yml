aws:
  ses:
    region: ${AWS_REGION:eu-central-1}
    configuration-set: ${AWS_SES_CONFIGURATION_SET:leadfarmfinder-main}


spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: o1jobs.de
    port: 587
    username: office@o1jobs.de
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

      mail.smtp.from: office@o1jobs.de
      mail.smtp.localhost: o1jobs.de

      # chmura wolniejsza -> 15s
      mail.smtp.connectiontimeout: ${MAIL_CONN_TIMEOUT_MS:15000}
      mail.smtp.timeout: ${MAIL_TIMEOUT_MS:15000}
      mail.smtp.writetimeout: ${MAIL_WRITE_TIMEOUT_MS:15000}

      mail.debug: false

leadfinder:
  query-cycle:
    cron: "0 0 3 * * SUN"
    score-threshold: 40
    test-limit: 5
  rabbit:
    outreach-events-exchange: outreach.events.exchange
    outreach-events-queue: outreach.event.queue
    outreach-events-dlq: outreach.event.dlq
    outreach-events-routing-key: outreach.event
    outreach-events-retry-queue: outreach.event.retry.queue
    outreach-events-retry-routing-key: outreach.event.retry
    outreach-events-dlq-routing-key: outreach.event.dlq
    retry-ttl-ms: ${RABBIT_RETRY_TTL_MS:30000}
    max-retry-attempts: ${RABBIT_MAX_RETRY_ATTEMPTS:2}
  agrarjobboerse:
    pagesPerRun: 2
    pageCap: 50
    admin-token: ${AJB_ADMIN_TOKEN:}
    enabled: ${AJB_ENABLED:false}
    dryRun: ${AJB_DRY_RUN:false}
    startUrl: ${AJB_START_URL:https://www.agrarjobboerse.de/boerse/stellenangebote?plz=&dist=10&bkz=501&bkz=109411&bkz=58540&bkz=520&bkz=491&bkz=538&bkz=739&bkz=590&bkz=625&bkz=90128&s=0}
    maxPagesPerRun: ${AJB_MAX_PAGES:1}
    maxOffersPerRun: ${AJB_MAX_OFFERS:25}
    minDelayMs: ${AJB_MIN_DELAY_MS:900}
    maxDelayMs: ${AJB_MAX_DELAY_MS:1800}
    pageTimeoutMs: ${AJB_PAGE_TIMEOUT_MS:45000}
    clickTimeoutMs: ${AJB_CLICK_TIMEOUT_MS:8000}
    cron:
      enabled: ${AJB_CRON_ENABLED:false}
      expression: ${AJB_CRON_EXPRESSION:0 35 2 * * *}

  email:
    provider: ${APP_MAIL_PROVIDER:ses}
    mx-check-enabled: ${EMAIL_MX_CHECK:true}
    mx-timeout-ms: ${EMAIL_MX_TIMEOUT_MS:2000}
    mx-unknown-policy: ${EMAIL_MX_UNKNOWN_POLICY:ALLOW}
    known-tlds: [de,com,net,eu]

  outreach:
    enabled: ${OUTREACH_ENABLED:true}
    from-address: ${OUTREACH_FROM:Patrycja Swigost <patrycja@office.o1jobs.de>}
    default-subject: ${OUTREACH_SUBJECT:kurze Frage – Arbeitskräfte zur Saison}
    max-emails-per-run: ${OUTREACH_MAX_PER_RUN:10}
    simulate-only: ${OUTREACH_SIMULATE_ONLY:false}
    interval-millis: ${OUTREACH_INTERVAL_MS:900000}
    delay-between-emails-millis: ${OUTREACH_DELAY_MS:15000}
    first-email-body-template: |
      Guten Tag,
      
      ich melde mich kurz bei Ihnen.
      
      Ich habe aktuell Kontakt zu mehreren Arbeitskräften aus Polen,
      die in den nächsten Wochen verfügbar sind (u. a. Spargel, Obst).
      Viele haben bereits Erfahrung in Deutschland – wir selbst arbeiten seit über 6 Jahren mit landwirtschaftlichen Betrieben zusammen.
      
      Falls das für Sie aktuell oder in den nächsten Wochen interessant ist,
      geben Sie mir gerne kurz Bescheid.
      
      Viele Grüße
      Patrycja
      o1jobs
      +49 160 6328144

    follow-up-subject: ${OUTREACH_FOLLOWUP_SUBJECT:kurze Rückmeldung}

    follow-up-min-days-since-last-email: ${OUTREACH_FOLLOWUP_MIN_DAYS:60}

    follow-up-email-body-template: |
      Guten Tag,
      
      ich melde mich kurz mit einer allgemeinen Information:
      
      Wir sind weiterhin in Kontakt mit Arbeitskräften aus Polen,
      die kurzfristig verfügbar sind, u. a. für Ernte, Spargel und Obst.
      
      Da die Saison läuft, informiere ich gerade verschiedene Betriebe in der Region.
      Falls bei Ihnen Bedarf entsteht oder sich etwas ergibt, geben Sie mir gerne kurz Bescheid.
      
      Bei mehreren Personen lässt sich in der Regel einiges unkompliziert regeln.
      
      Wenn wir bereits im Austausch sind – alles gut, wir bleiben natürlich in Kontakt.
      
      Viele Grüße
      Patrycja
      o1jobs
      +49 160 6328144
      www.o1jobs.de

  scraper:
    min-hours-between-scrapes: 12

  discovery:
    results-per-page: 10
    max-pages-per-run: 2
    default-max-serp-page: 10
    limit-per-run: 100
    queries-per-run: ${DISCOVERY_QUERIES_PER_RUN:2}

    queries:
      # === THÜRINGEN — prawie nieobecny w puli ===
      - '"Inhaber" Gemüsehof Thüringen Kontakt'
      - '"Inhaber" Obsthof Thüringen Adresse'
      - '"GbR" Spargelhof Thüringen Telefon'
      - '"Inhaber" Bauernhof Erfurt Kontakt'
      - '"GbR" Hofladen Gotha Adresse'
      - '"Inhaber" Direktvermarkter Weimarer Land Kontakt'
      - '"GbR" Gemüsebau Nordhausen Telefon'
      - '"Inhaber" Obsthof Kyffhäuserkreis Adresse'

      # === SACHSEN-ANHALT — uzupełnienie ===
      - '"Inhaber" Hofladen Magdeburg Land Kontakt'
      - '"GbR" Obsthof Harz Adresse'
      - '"Inhaber" Direktvermarkter Mansfeld-Südharz Telefon'
      - '"GbR" Gemüsehof Saalekreis Kontakt'
      - '"Inhaber" Bauernhof Wittenberg Adresse'
      - '"GbR" Spargelhof Stendal Telefon'
      - '"Inhaber" Hofladen Jerichower Land Kontakt'

      # === MECKLENBURG-VORPOMMERN — brak w puli ===
      - '"Inhaber" Obsthof Rostock Land Kontakt'
      - '"GbR" Gemüsehof Schwerin Land Adresse'
      - '"Inhaber" Direktvermarkter Vorpommern-Rügen Telefon'
      - '"GbR" Hofladen Mecklenburgische Seenplatte Kontakt'
      - '"Inhaber" Bauernhof Nordwestmecklenburg Adresse'
      - '"GbR" Spargelhof Ludwigslust-Parchim Telefon'

      # === RHEINLAND-PFALZ — brakujące Landkreise ===
      - '"Inhaber" Obsthof Cochem-Zell Kontakt'
      - '"GbR" Weingut Mosel-Saar-Ruwer Adresse'
      - '"Inhaber" Direktvermarkter Vulkaneifel Telefon'
      - '"GbR" Hofladen Donnersbergkreis Kontakt'
      - '"Inhaber" Gemüsehof Bad Kreuznach Adresse'
      - '"GbR" Obsthof Kusel Telefon'

      # === SAARLAND — całkowity brak ===
      - '"Inhaber" Hofladen Saarland Kontakt'
      - '"GbR" Direktvermarkter Saarlouis Adresse'
      - '"Inhaber" Obsthof Merzig-Wadern Telefon'
      - '"GbR" Gemüsehof Saar-Pfalz-Kreis Kontakt'

      # === HESSEN — brakujące Landkreise ===
      - '"Inhaber" Obsthof Bergstraße Kontakt'
      - '"GbR" Gemüsehof Wetteraukreis Adresse'
      - '"Inhaber" Direktvermarkter Marburg-Biedenkopf Telefon'
      - '"GbR" Hofladen Lahn-Dill-Kreis Kontakt'
      - '"Inhaber" Obsthof Schwalm-Eder-Kreis Adresse'
      - '"GbR" Gemüsehof Waldeck-Frankenberg Telefon'
      - '"Inhaber" Spargelhof Groß-Gerau Kontakt'
      - '"GbR" Direktvermarkter Darmstadt-Dieburg Adresse'

      # === BAYERN FRANKEN / SCHWABEN — uzupełnienie ===
      - '"Inhaber" Obsthof Schweinfurt Land Kontakt'
      - '"GbR" Gemüsehof Kitzingen Adresse'
      - '"Inhaber" Direktvermarkter Haßberge Telefon'
      - '"GbR" Hofladen Rhön-Grabfeld Kontakt'
      - '"Inhaber" Obsthof Miltenberg Adresse'
      - '"GbR" Gemüsehof Aschaffenburg Land Telefon'
      - '"Inhaber" Spargelhof Donau-Ries Kontakt'
      - '"GbR" Direktvermarkter Augsburg Land Adresse'
      - '"Inhaber" Obsthof Unterallgäu Telefon'

app:
  outreach:
    unsubscribe-base-url: ${UNSUBSCRIBE_BASE_URL:https://leadfarmfinder.onrender.com/unsubscribe/}
  admin-token: ${ADMIN_TOKEN:local-dev-token}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://api.openai.com/v1
  model: gpt-5.1

serpapi:
  api-key: ${SERPAPI_API_KEY:}
  base-url: https://serpapi.com/search
  default-country: de
  default-language: de
  default-engine: google

logging:
  level:
    com.mike.leadfarmfinder.service.ajb: INFO
    com.mike.leadfarmfinder.bootstrap: INFO

directory:
  enabled: ${DIRECTORY_ENABLED:false}
  max-urls-per-run: ${DIRECTORY_MAX-URLS-PER-RUN:200}

hofladenfinder:
  base-url: https://www.hofladenfinder.org/farmshop/search
  max-pages-per-product: 200
  products:
    - spargel
    - erdbeeren
    - kartoffeln
    - tomaten
    - gurken
    - blumen
    - gemüse
    - obst
    - kräuter
    - kürbis
    - zwiebeln
    - möhren

osm:
  cron: "0 0 2 * * SUN"
  overpass-url: https://overpass-api.de/api/interpreter
  bbox: "47.3,5.9,55.1,15.0"
  timeout-ms: 60000
  max-urls-per-run: 300
