spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  liquibase:
    enabled: true

leadfinder:
  query-cycle:
    cron: "-"
    score-threshold: 40
    test-limit: 5
  rabbit:
    outreach-events-exchange: outreach.events.exchange
    outreach-events-queue: outreach.event.queue
    outreach-events-dlq: outreach.event.dlq
    outreach-events-routing-key: outreach.event
    outreach-events-retry-queue: outreach.event.retry.queue
    outreach-events-retry-routing-key: outreach.event.retry
    outreach-events-dlq-routing-key: outreach.event.dlq
    retry-ttl-ms: 500
    max-retry-attempts: 2

aws:
  ses:
    region: eu-central-1
    configuration-set: leadfarmfinder-test

app:
  admin-token: local-dev-token
  outreach:
    unsubscribe-base-url: "http://localhost:8080/unsubscribe/"

openai:
  api-key: dummy
  base-url: https://api.openai.com/v1
  model: gpt-4.1-mini

serpapi:
  api-key: dummy
  base-url: https://serpapi.com/search
  default-country: de
  default-language: de
  default-engine: google

directory:
  enabled: false
  max-urls-per-run: 1

hofladenfinder:
  base-url: https://www.hofladenfinder.org/farmshop/search
  max-pages-per-product: 1
  products:
    - spargel